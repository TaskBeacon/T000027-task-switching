subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3
subinfo_mapping:
  subject_id: 受试者编号（3位）
  Participant Information: 被试信息
  registration_failed: 注册失败
  registration_successful: 注册成功
  invalid_input: "{field} 输入无效"
window:
  size: [1280, 720]
  units: pix
  screen: 0
  bg_color: black
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60
task:
  task_name: task_switching
  save_path: ./outputs/sim_sampler
  total_blocks: 1
  total_trials: 24
  trial_per_block: 24
  conditions:
    - cued_switching
  key_list:
    - f
    - j
    - space
  left_key: f
  right_key: j
  seed_mode: same_across_sub
  delta: 1
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
timing:
  fixation_duration: [0.3, 0.6]
  cue_duration: 0.6
  decision_deadline: 2.0
  feedback_duration: 0.8
  iti_duration: [0.3, 0.6]
stimuli:
  instruction_text:
    type: text
    text: |
      任务切换实验

      每轮会先出现规则线索，然后呈现一个数字。

      规则1：奇偶判断（奇数/偶数）
      规则2：大小判断（小于5/大于5）

      按键规则在每轮会随当前规则显示。
      请尽快并准确作答。

      按空格键开始。
    color: white
    height: 29
    wrapWidth: 1080
    pos: [0, 60]
    font: SimHei
  fixation:
    type: text
    text: "+"
    color: [0.92, 0.92, 0.92]
    height: 52
    pos: [0, 0]
    font: SimHei
  cue_title:
    type: text
    text: "请准备当前判断规则"
    color: [0.95, 0.95, 0.92]
    height: 34
    wrapWidth: 980
    pos: [0, 290]
    font: SimHei
  score_text:
    type: text
    text: "当前得分：{current_score}"
    color: [0.78, 0.95, 0.86]
    height: 30
    pos: [0, 245]
    font: SimHei
  cue_parity:
    type: text
    text: "规则：奇偶判断"
    color: [0.90, 0.98, 0.70]
    height: 48
    wrapWidth: 900
    pos: [0, 95]
    font: SimHei
  cue_magnitude:
    type: text
    text: "规则：大小判断"
    color: [0.78, 0.90, 1.0]
    height: 48
    wrapWidth: 900
    pos: [0, 95]
    font: SimHei
  trial_type_tag:
    type: text
    text: "本轮类型：{trial_type_cn}"
    color: [0.85, 0.85, 0.85]
    height: 26
    wrapWidth: 800
    pos: [0, 20]
    font: SimHei
  rule_prompt:
    type: text
    text: "当前规则：{rule_name_cn}"
    color: [0.96, 0.92, 0.62]
    height: 32
    wrapWidth: 900
    pos: [0, -185]
    font: SimHei
  key_hint:
    type: text
    text: "按键：{left_key}={left_label_cn}，{right_key}={right_label_cn}"
    color: [0.90, 0.90, 0.90]
    height: 28
    wrapWidth: 980
    pos: [0, -245]
    font: SimHei
  feedback_correct:
    type: text
    text: |
      正确
      你的判断：{predicted_category_cn}
      正确类别：{correct_category_cn}
      本轮得分变化：{score_delta:+d}
      当前得分：{score_after}
    color: [0.70, 0.96, 0.70]
    height: 30
    wrapWidth: 980
    pos: [0, 20]
    font: SimHei
  feedback_incorrect:
    type: text
    text: |
      错误
      你的判断：{predicted_category_cn}
      正确类别：{correct_category_cn}
      本轮得分变化：{score_delta:+d}
      当前得分：{score_after}
    color: [1.0, 0.78, 0.62]
    height: 30
    wrapWidth: 980
    pos: [0, 20]
    font: SimHei
  feedback_timeout:
    type: text
    text: |
      本轮超时
      当前规则：{rule_name_cn}
      正确类别：{correct_category_cn}
      当前得分：{score_after}
    color: [1.0, 0.50, 0.50]
    height: 30
    wrapWidth: 980
    pos: [0, 20]
    font: SimHei
  block_break:
    type: text
    text: |
      第 {block_num}/{total_blocks} 组完成

      准确率：{accuracy:.1%}
      切换试次准确率：{switch_accuracy:.1%}
      重复试次准确率：{repeat_accuracy:.1%}
      平均反应时：{mean_rt_ms:.0f} ms
      切换代价（RT）：{switch_cost_ms:+.0f} ms
      超时次数：{timeout_count}
      本组净得分：{net_score:+d}
      当前总得分：{score_end}

      按空格键继续。
    color: white
    height: 25
    wrapWidth: 1100
    pos: [0, 0]
    font: SimHei
  good_bye:
    type: text
    text: |
      任务结束

      总试次数：{total_trials}
      总体准确率：{accuracy:.1%}
      切换试次准确率：{switch_accuracy:.1%}
      重复试次准确率：{repeat_accuracy:.1%}
      平均反应时：{mean_rt_ms:.0f} ms
      切换试次平均RT：{mean_switch_rt_ms:.0f} ms
      重复试次平均RT：{mean_repeat_rt_ms:.0f} ms
      切换代价（RT）：{switch_cost_ms:+.0f} ms
      超时次数：{timeout_count}
      总净得分：{net_score:+d}
      最终得分：{score_end}

      按空格键退出。
    color: white
    height: 25
    wrapWidth: 1100
    pos: [0, 0]
    font: SimHei
triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    fixation_onset: 20
    cue_onset: 30
    decision_onset: 40
    choice_left: 41
    choice_right: 42
    choice_timeout: 43
    feedback_correct: 50
    feedback_incorrect: 51
    feedback_timeout: 52
    iti_onset: 60
  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
  timing:
    post_delay_ms: 1
  policy:
    strict: false
controller:
  switch_probability: 0.5
  digit_pool: [1, 2, 3, 4, 6, 7, 8, 9]
  initial_score: 0
  correct_delta: 1
  incorrect_delta: -1
  timeout_delta: 0
  random_seed: 0
  enable_logging: true
sim:
  output_dir: outputs/sim_sampler
  seed: 0
  participant_id: sim001
  session_id: sub-sim001_task-task_switching_sampler_seed0
  log_path: outputs/sim_sampler/sub-sim001_task-task_switching_sampler_seed0_sim_events.jsonl
  policy: warn
  default_rt_s: 0.2
  clamp_rt: false
  responder:
    type: responders.task_sampler:TaskSamplerResponder
    kwargs:
      quality_rate_repeat: 0.86
      quality_rate_switch: 0.74
      miss_rate: 0.06
      rt_repeat_mean_s: 0.58
      rt_switch_mean_s: 0.72
      rt_sd_s: 0.10
      rt_min_s: 0.20
